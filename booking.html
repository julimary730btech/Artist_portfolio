{% extends 'artist/base.html' %}

{% block content %}
<h1>Book Me for Your Event 💍</h1>

<form method="POST" style="max-width:500px; margin:auto;">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Your Name" required style="width:100%; padding:10px;"><br><br>

    <input type="text" name="phone" placeholder="Phone Number" required style="width:100%; padding:10px;"><br><br>

    <input type="text" name="event_type" placeholder="Event Type" required style="width:100%; padding:10px;"><br><br>

    <input type="date" name="date" required style="width:100%; padding:10px;"><br><br>

    <textarea name="message" placeholder="Message" style="width:100%; padding:10px;"></textarea><br><br>

    <button type="submit">Submit Booking</button>
</form>

{% endblock %}
