<!DOCTYPE html>
<html>
<head>
    <title>Mehendi & Art Portfolio</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #fff5f8;
        }

        nav {
            background-color: #d63384;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        footer {
            background-color: #d63384;
            color: white;
            padding: 10px;
            margin-top: 40px;
        }

        button {
            background-color: #d63384;
            color: white;
            padding: 10px 20px;
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'gallery' %}">Gallery</a>
    <a href="{% url 'booking' %}">Book Me</a>
    <a href="{% url 'contact' %}">Contact</a>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
           <div style="background:green; color:white; padding:10px;">
               {{ message }}
           </div>
        {% endfor %}
    {% endif %}
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Julimary | Mehendi & Painting Artist
</footer>

</body>
</html>
